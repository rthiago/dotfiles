## Dracula

# ══════════════════════════════════════════════════════════════════════════════
# Hyprland Floating Window Rules
# ══════════════════════════════════════════════════════════════════════════════
#
# SYNTAX: Hyprland >= 0.53 (new syntax)
#   windowrule = match:class <regex>, float on
#   windowrule = match:title <regex>, float on
#
# To find a window's class/title, run while the app is open:
#   hyprctl clients | grep -i class
#   hyprctl clients | grep -i title
#
# NOTE: "float" is a STATIC rule — it only applies at window creation time,
# based on initialClass and initialTitle. It cannot react to title changes
# after the window is already open.
#
# If you're on Hyprland < 0.53, replace each rule with the legacy format:
#   windowrulev2 = float, class:^(classname)$
#   windowrulev2 = float, class:^(classname)$, title:^(titlename)$
# ══════════════════════════════════════════════════════════════════════════════


# ─── Password Managers ───────────────────────────────────────────────────────
windowrule = match:class ^(Bitwarden)$, float on
windowrule = match:class ^(bitwarden)$, float on
windowrule = match:class ^(org\.keepassxc\.KeePassXC)$, float on
windowrule = match:class ^(KeePassXC)$, float on
windowrule = match:class ^(1password)$, float on
windowrule = match:class ^(Proton Pass)$, float on
# Bitwarden as Chrome PWA / browser extension popup
windowrule = match:class ^((chrome|brave)-nngceckbapebfimnlniiiahkandclblb-Default)$, float on
windowrule = match:class ^((chrome|brave)-nngceckbapebfimnlniiiahkandclblb-Default)$, center on

# ─── Browser Extension Popups & PWAs (Chrome/Chromium-based) ─────────────────
# Matches any Chrome/Chromium extension popup window
windowrule = match:class ^(chrome-[a-zA-Z]+-Default)$, float on

# ─── File Managers (dialogs & small windows) ─────────────────────────────────
# Thunar dialogs
windowrule = match:class ^(thunar)$, match:title ^(File Operation Progress)$, float on
windowrule = match:class ^(thunar)$, match:title ^(Confirm to replace files)$, float on
windowrule = match:class ^(thunar)$, match:title ^(Rename.*)$, float on
windowrule = match:class ^(thunar)$, match:title ^(Create.*)$, float on
windowrule = match:class ^(thunar)$, match:title ^(.*Properties)$, float on
windowrule = match:class ^(thunar)$, match:title ^(Trash)$, float on
windowrule = match:class ^(thunar)$, match:title ^(Attention)$, float on
# Dolphin dialogs
windowrule = match:class ^(org\.kde\.dolphin)$, match:title ^(Progress Dialog — Dolphin)$, float on
windowrule = match:class ^(org\.kde\.dolphin)$, match:title ^(Copying — Dolphin)$, float on
windowrule = match:class ^(org\.kde\.dolphin)$, match:title ^(Moving — Dolphin)$, float on
windowrule = match:class ^(org\.kde\.dolphin)$, match:title ^(Deleting — Dolphin)$, float on
# Nautilus / Nemo / PCManFM / Nemo preview
windowrule = match:class ^(file-roller)$, float on
windowrule = match:class ^(nemo)$, match:title ^(.*Properties)$, float on
windowrule = match:class ^(pcmanfm-qt)$, match:title ^(Copy Files)$, float on
windowrule = match:class ^(pcmanfm-qt)$, match:title ^(Move Files)$, float on
# Thunar (all windows) / bare Nautilus
windowrule = match:class (?i)thunar, float on
windowrule = match:class ^(Nautilus)$, float on

# ─── XDG Desktop Portal / File Pickers / Save Dialogs ────────────────────────
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(xdg-desktop-portal-kde)$, float on
windowrule = match:class ^(xdg-desktop-portal-hyprland)$, float on
windowrule = match:class ^(xdg-desktop-portal-gnome)$, float on
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Open Folder)$, float on
windowrule = match:title ^(Save As)$, float on
windowrule = match:title ^(Save File)$, float on
windowrule = match:title ^(Select a File)$, float on

# ─── Video Conferencing ──────────────────────────────────────────────────────
windowrule = match:class ^([Zz]oom)$, float on
windowrule = match:title ^(Zoom - Licensed Account)$, float on
windowrule = match:title ^(zoom)$, float on
# Google Meet / Teams (as separate windows)
windowrule = match:title ^(Microsoft Teams.*)$, match:class ^(chrome-.+-Default)$, float on
# Zoom / Meet join-via-browser links
windowrule = match:class ^(.*join\?action=join.*|.*zoom.*)$, float on

# ─── Picture-in-Picture ──────────────────────────────────────────────────────
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture in picture)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)$, float on

# ─── System / Audio / Bluetooth / Network ────────────────────────────────────
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(org\.pulseaudio\.pavucontrol)$, float on
windowrule = match:class ^(com\.saivert\.pwvucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nm-applet)$, float on
windowrule = match:class ^(com\.network\.manager)$, float on
windowrule = match:class ^(baobab)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(qt6ct)$, float on
windowrule = match:class ^(Blueberry\.py)$, float on

# ─── System Monitors / Task Managers ─────────────────────────────────────────
windowrule = match:initial_title ^(btop)$, float on
windowrule = match:initial_title ^(htop)$, float on
windowrule = match:initial_title ^(top)$, float on
windowrule = match:class ^(gnome-system-monitor)$, float on
windowrule = match:class ^(stacer)$, float on
windowrule = match:class ^(mission-center)$, float on
windowrule = match:class ^(resources)$, float on

# ─── Calculators ─────────────────────────────────────────────────────────────
windowrule = match:class ^(org\.gnome\.Calculator)$, float on
windowrule = match:class ^([Qq]alculate-gtk)$, float on
windowrule = match:class ^(kcalc)$, float on
windowrule = match:class ^(galculator)$, float on
windowrule = match:class ^(speedcrunch)$, float on

# ─── Media Players ───────────────────────────────────────────────────────────
windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(vlc)$, float on
windowrule = match:class ^(com\.github\.rafostar\.Clapper)$, float on
windowrule = match:class ^(celluloid)$, float on
windowrule = match:class ^(Viewnior)$, float on
windowrule = match:class ^(imv)$, float on
windowrule = match:class ^(eog)$, float on
windowrule = match:class ^(org\.gnome\.Loupe)$, float on
windowrule = match:class ^(feh)$, float on
windowrule = match:class ^(gwenview)$, float on

# ─── Screenshot / Color Picker / Screen Tools ────────────────────────────────
windowrule = match:class ^(com\.gabm\.satty)$, float on
windowrule = match:class ^(flameshot)$, float on
windowrule = match:class ^(grim)$, float on
windowrule = match:class ^(slurp)$, float on
windowrule = match:class ^(org\.gnome\.Screenshot)$, float on
windowrule = match:class ^(gcolor3)$, float on
windowrule = match:class ^(hyprpicker)$, float on
windowrule = match:class ^(gpick)$, float on
windowrule = match:class ^(Gnome-screenshot)$, float on

# ─── Authentication / Polkit Agents ──────────────────────────────────────────
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, float on
windowrule = match:class ^(polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(lxqt-policykit-agent)$, float on
windowrule = match:class ^(org\.kde\.polkit-kde-authentication-agent-1)$, float on
windowrule = match:title ^(Authentication Required)$, float on
windowrule = match:class ^(gcr-prompter)$, float on
# Pinentry (GPG passphrase prompts)
windowrule = match:class ^(pinentry-.*)$, float on
# Hardware-token / 2FA apps
windowrule = match:class ^(YubiKey Manager)$, float on
windowrule = match:class ^(io\.ente\.auth)$, float on

# ─── Steam & Gaming ──────────────────────────────────────────────────────────
# Float Steam dialogs but NOT the main Steam window
windowrule = match:class ^([Ss]team)$, match:title negative:^([Ss]team)$, float on
windowrule = match:class ^(steam_app_.*)$, float on
windowrule = match:class ^(gamescope)$, float on
windowrule = match:class ^(lutris)$, float on
windowrule = match:class ^(heroic)$, float on
windowrule = match:class ^(com\.heroicgameslauncher\.hgl)$, float on
windowrule = match:class ^(protonup-qt)$, float on
windowrule = match:class ^(net\.davidotek\.pupgui2)$, float on

# ─── Messaging / Chat (small/popup windows) ──────────────────────────────────
windowrule = match:class ^([Ww]hatsapp-for-linux)$, float on
windowrule = match:class ^(ZapZap)$, float on
windowrule = match:class ^(com\.rtosta\.zapzap)$, float on
windowrule = match:class ^(org\.telegram\.desktop)$, match:title negative:^(Telegram.*)$, float on
windowrule = match:class ^([Ss]ignal)$, match:title negative:^(Signal.*)$, float on
windowrule = match:class ^(Slack)$, float on

# ─── Download Managers ───────────────────────────────────────────────────────
windowrule = match:class ^(fdm)$, float on
windowrule = match:class ^(freedownloadmanager)$, float on
windowrule = match:class ^(uget-gtk)$, float on
windowrule = match:class ^(transmission-gtk)$, float on
windowrule = match:class ^(deluge)$, float on
windowrule = match:class ^(Free Download Manager)$, float on

# ─── Archive Managers ────────────────────────────────────────────────────────
windowrule = match:class ^(org\.gnome\.FileRoller)$, float on
windowrule = match:class ^(xarchiver)$, float on
windowrule = match:class ^(engrampa)$, float on

# ─── Settings / Control Panels ───────────────────────────────────────────────
windowrule = match:class ^(gnome-control-center)$, float on
windowrule = match:class ^(org\.kde\.systemsettings)$, float on
windowrule = match:class ^(xfce4-settings-manager)$, float on
windowrule = match:class ^(lxappearance)$, float on
windowrule = match:class ^(arandr)$, float on
windowrule = match:class ^(wdisplays)$, float on
windowrule = match:class ^(nwg-displays)$, float on
windowrule = match:class ^(gnome-tweaks)$, float on
# Qt / Mate settings panels (stay focused to avoid losing them)
windowrule = match:class ^(qt5ct)$, float on, stay_focused on
windowrule = match:class ^(Qtconfig-qt4)$, float on, stay_focused on
windowrule = match:class ^(Mate-appearance-properties)$, float on
windowrule = match:class ^(Mate-control-center)$, float on
# Misc hardware / backup configurators
windowrule = match:class ^(snappergui)$, float on
windowrule = match:class ^(uhk-agent)$, float on

# ─── IDE / Editor Popups (float dialogs, keep main tiled) ────────────────────
# VSCode/VSCodium: float everything except the main editor window
windowrule = match:class ^(codium|codium-url-handler|VSCodium)$, match:title negative:(.*codium.*|.*VSCodium.*), float on
windowrule = match:class ^(code|code-url-handler|Code)$, match:title negative:(.*Visual Studio Code.*|.*Code.*)$, float on
# Sublime Text / Obsidian — float unconditionally (sent to special workspaces below)
windowrule = match:class ^(sublime_text)$, float on
windowrule = match:class ^(obsidian)$, float on

# ─── Browser "About" / Popups ────────────────────────────────────────────────
windowrule = match:title ^(About Mozilla Firefox)$, float on
windowrule = match:title ^(About Brave)$, float on
windowrule = match:title ^(About Google Chrome)$, float on
windowrule = match:title ^(Library)$, match:class ^(firefox)$, float on

# ─── Clipboard Managers ──────────────────────────────────────────────────────
windowrule = match:class ^(com\.github\.hluk\.copyq)$, float on
windowrule = match:class ^(copyq)$, float on
windowrule = match:class ^(cliphist)$, float on

# ─── Wayland Utility Windows ─────────────────────────────────────────────────
windowrule = match:class ^(wlogout)$, float on
windowrule = match:class ^(waypaper)$, float on
windowrule = match:class ^(swayimg)$, float on

# ─── Misc Desktop Apps ──────────────────────────────────────────────────────
windowrule = match:class ^(org\.gnome\.Calendar)$, float on
windowrule = match:class ^(org\.gnome\.clocks)$, float on
windowrule = match:class ^(org\.gnome\.Weather)$, float on
windowrule = match:class ^(org\.gnome\.Characters)$, float on
windowrule = match:class ^(org\.gnome\.font-viewer)$, float on
windowrule = match:class ^(org\.gnome\.Nautilus)$, match:title ^(.*Properties)$, float on
windowrule = match:class ^(zenity)$, float on
windowrule = match:class ^(yad)$, float on
windowrule = match:class ^(xdg-desktop-portal)$, float on
windowrule = match:class ^(com\.obsproject\.Studio)$, match:title negative:^(OBS.*)$, float on
# Sparrow Bitcoin wallet
windowrule = match:class ^(Sparrow)$, float on

# ─── VPN / Network Tools ────────────────────────────────────────────────────
windowrule = match:class ^(mullvad-vpn)$, float on
windowrule = match:class ^(Mullvad VPN)$, float on
windowrule = match:class ^(protonvpn-app)$, float on
windowrule = match:class ^(wireguard)$, float on
windowrule = match:class ^(openvpn)$, float on
windowrule = match:class ^(onedriver)$, float on
windowrule = match:class ^(onedriver-launcher)$, float on
windowrule = match:class ^(Protonvpn)$, float on
windowrule = match:class ^(Wireguird)$, float on

# ─── Virtual Machines (dialogs only) ─────────────────────────────────────────
windowrule = match:class ^(virt-manager)$, match:title negative:^(Virtual Machine Manager)$, float on

# ─── Disk / Partition / USB Tools ────────────────────────────────────────────
windowrule = match:class ^(gparted)$, float on
windowrule = match:class ^(gnome-disks)$, float on
windowrule = match:class ^(udiskie)$, float on
windowrule = match:class ^(etcher)$, float on
windowrule = match:class ^(com\.github\.tchx84\.Flatseal)$, float on
windowrule = match:class ^(GParted)$, float on

# ─── Catch-All: Generic Dialogs & Confirmations ─────────────────────────────
windowrule = match:title ^(Confirm)$, float on
windowrule = match:title ^(Dialog)$, float on
windowrule = match:title ^(Preferences)$, float on
windowrule = match:title ^(About )(.*)$, float on


# ══════════════════════════════════════════════════════════════════════════════
# Optional: center floating windows and set a reasonable default size
# ══════════════════════════════════════════════════════════════════════════════
# Uncomment below if you want all floating windows to open centered:
# windowrule = match:float true, center on

# Or set a default size for specific apps:
windowrule = match:class ^(pavucontrol)$, size 800 500
windowrule = match:class ^(blueman-manager)$, size 700 450
windowrule = match:class ^([Zz]oom)$, size 900 600
windowrule = match:class ^(org\.gnome\.Calculator)$, size 360 520

# ─── Terminal Opacity ───────────────────────────────────────────────────────
windowrule = match:class ^(Alacritty)$, opacity 0.9 0.9
windowrule = match:class ^(com\.mitchellh\.ghostty)$, opacity 0.9 0.9

# ─── Workspace Rules ────────────────────────────────────────────────────────
windowrule = match:class ^(org\.gnome\.Calculator)$, workspace special:calculator
windowrule = match:class ^(sublime_text)$, workspace special:sublime
windowrule = match:class ^(obsidian)$, workspace special:sublime
windowrule = match:class ^(Slack)$, workspace special:slack
